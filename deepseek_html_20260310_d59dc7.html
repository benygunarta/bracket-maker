<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket System</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- html2canvas for PDF rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f35 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #4a90e2 0%, #9b59b6 50%, #e74c3c 100%);
            padding: 2px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header-content {
            background: #0f1424;
            border-radius: 18px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(45deg, #4a90e2, #9b59b6, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .logo span {
            font-size: 0.9em;
            color: #888;
            font-weight: 300;
            display: block;
        }

        .tournament-info {
            display: flex;
            gap: 30px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #888;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Control Panel */
        .control-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title {
            font-size: 1.2em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: #e74c3c;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #9b59b6;
            box-shadow: 0 0 10px rgba(155,89,182,0.3);
        }

        .form-control option {
            background: #1a1f35;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(74,144,226,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        .btn-excel {
            background: #1d6f42;
            color: white;
        }

        .btn-pdf {
            background: #b22222;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* Participants Section */
        .participants-section {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .participants-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .participants-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .participant-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #9b59b6;
            transition: all 0.3s;
            position: relative;
        }

        .participant-card:hover {
            background: rgba(155,89,182,0.1);
            transform: translateX(5px);
        }

        .participant-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .participant-name {
            font-weight: 600;
            font-size: 1.1em;
        }

        .participant-stats {
            font-size: 0.8em;
            color: #888;
            margin-top: 3px;
        }

        .participant-actions {
            display: flex;
            gap: 8px;
        }

        .edit-participant {
            color: #4a90e2;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .edit-participant:hover {
            opacity: 1;
        }

        .remove-participant {
            color: #e74c3c;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .remove-participant:hover {
            opacity: 1;
        }

        /* Edit Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1f35;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(155,89,182,0.3);
        }

        .modal-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Bracket Container */
        .bracket-container {
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bracket-wrapper {
            display: flex;
            gap: 40px;
            padding: 20px 0;
            min-width: min-content;
        }

        .round {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .round-title {
            text-align: center;
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .match {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 12px;
            padding: 15px;
            min-width: 280px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .match:hover {
            border-color: #9b59b6;
            box-shadow: 0 5px 15px rgba(155,89,182,0.2);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .team-row.winner {
            background: rgba(155,89,182,0.2);
            border-left: 3px solid #9b59b6;
        }

        .team-name {
            font-weight: 500;
            flex: 1;
        }

        .team-score {
            width: 40px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            border-radius: 5px;
            padding: 3px;
            margin: 0 5px;
        }

        .team-score:focus {
            outline: 2px solid #9b59b6;
        }

        .team-kills {
            width: 50px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            border-radius: 5px;
            padding: 3px;
            margin: 0 5px;
            font-size: 0.85em;
        }

        .team-duration {
            width: 60px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            border-radius: 5px;
            padding: 3px;
            font-size: 0.8em;
        }

        .stats-badge {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        /* Swiss System Table */
        .swiss-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            overflow: hidden;
        }

        .swiss-table th {
            background: rgba(155,89,182,0.2);
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .swiss-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Group Stage */
        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .group-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
        }

        .group-title {
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-align: center;
        }

        .group-table {
            width: 100%;
            border-collapse: collapse;
        }

        .group-table th {
            background: rgba(155,89,182,0.1);
            padding: 8px;
            font-size: 0.8em;
        }

        .group-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Animations */
        @keyframes glow {
            0% { box-shadow: 0 0 5px #9b59b6; }
            50% { box-shadow: 0 0 20px #9b59b6; }
            100% { box-shadow: 0 0 5px #9b59b6; }
        }

        .highlight {
            animation: glow 1.5s infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
            border-radius: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .tournament-info {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .action-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <h1>TOURNAMENT BRACKET</h1>
                <span>PROFESSIONAL BRACKET SYSTEM</span>
            </div>
            <div class="tournament-info">
                <div class="info-item">
                    <div class="info-label">System</div>
                    <div class="info-value" id="currentSystem">Single Elimination</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Participants</div>
                    <div class="info-value" id="participantCount">0/30</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Matches</div>
                    <div class="info-value" id="matchCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="panel-title">
            <i class="fas fa-sliders-h"></i> Tournament Configuration
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label><i class="fas fa-trophy"></i> Tournament Name</label>
                <input type="text" class="form-control" id="tournamentName" value="Tournament Season 1" placeholder="Enter tournament name">
            </div>
            <div class="form-group">
                <label><i class="fas fa-sitemap"></i> Bracket System</label>
                <select class="form-control" id="bracketSystem">
                    <option value="single">Single Elimination (Gugur Tunggal)</option>
                    <option value="double">Double Elimination (Gugur Ganda)</option>
                    <option value="group">Group Stage (Sistem Grup)</option>
                    <option value="swiss">Swiss System</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-users"></i> Add Participant</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" class="form-control" id="participantName" placeholder="Participant name" maxlength="30">
                    <button class="btn btn-secondary" onclick="addParticipant()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="initializeTournament()"><i class="fas fa-play"></i> Initialize Tournament</button>
            <button class="btn btn-excel" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export to Excel</button>
            <button class="btn btn-pdf" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> Export to PDF</button>
            <button class="btn btn-primary" onclick="printBracket()"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="participants-section">
        <div class="participants-header">
            <div class="panel-title" style="margin-bottom: 0;">
                <i class="fas fa-users"></i> Participants (Max 30)
            </div>
            <div>
                <button class="btn btn-secondary" onclick="addMultipleParticipants()"><i class="fas fa-random"></i> Generate Sample</button>
            </div>
        </div>
        <div class="participants-list" id="participantsList">
            <!-- Participants will be added here dynamically -->
        </div>
    </div>

    <div class="bracket-container" id="bracketContainer">
        <div class="bracket-wrapper" id="bracketWrapper">
            <!-- Bracket will be rendered here -->
        </div>
    </div>

    <!-- Score Input Modal -->
    <div class="modal" id="scoreModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Enter Match Results</div>
            <div id="modalTeams">
                <!-- Teams will be inserted here -->
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveMatchScore()">Save Results</button>
            </div>
        </div>
    </div>

    <!-- Edit Participant Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title">Edit Participant</div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #aaa;">Team Name</label>
                <input type="text" class="form-control" id="editParticipantName" placeholder="Enter team name">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditParticipant()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let participants = [];
        let matches = [];
        let currentMatchId = null;
        let currentEditId = null;
        let tournamentInitialized = false;
        let bracketSystem = 'single';
        
        // Add participant
        function addParticipant() {
            const nameInput = document.getElementById('participantName');
            const name = nameInput.value.trim();
            
            if (participants.length >= 30) {
                alert('Maximum 30 participants allowed!');
                return;
            }
            
            if (name === '') {
                alert('Please enter a participant name');
                return;
            }
            
            participants.push({
                id: Date.now() + Math.random(),
                name: name,
                wins: 0,
                losses: 0,
                draws: 0,
                totalKills: 0,
                totalDuration: 0,
                points: 0,
                buchholz: 0,
                opponents: []
            });
            
            nameInput.value = '';
            updateParticipantsList();
            updateInfo();
        }
        
        // Edit participant
        function editParticipant(id) {
            const participant = participants.find(p => p.id === id);
            if (participant) {
                currentEditId = id;
                document.getElementById('editParticipantName').value = participant.name;
                document.getElementById('editModal').style.display = 'flex';
            }
        }
        
        // Save edit participant
        function saveEditParticipant() {
            if (!currentEditId) return;
            
            const newName = document.getElementById('editParticipantName').value.trim();
            if (newName === '') {
                alert('Please enter a team name');
                return;
            }
            
            const participant = participants.find(p => p.id === currentEditId);
            if (participant) {
                participant.name = newName;
                
                // Update participant name in matches
                matches.forEach(match => {
                    if (match.team1 && match.team1.id === currentEditId) {
                        match.team1.name = newName;
                    }
                    if (match.team2 && match.team2.id === currentEditId) {
                        match.team2.name = newName;
                    }
                });
                
                updateParticipantsList();
                if (tournamentInitialized) {
                    renderBracket();
                }
            }
            
            closeEditModal();
        }
        
        // Close edit modal
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditId = null;
        }
        
        // Remove participant
        function removeParticipant(id) {
            if (confirm('Are you sure you want to remove this participant?')) {
                participants = participants.filter(p => p.id !== id);
                
                // Remove participant from matches
                matches = matches.filter(m => 
                    !(m.team1 && m.team1.id === id) && 
                    !(m.team2 && m.team2.id === id)
                );
                
                updateParticipantsList();
                if (tournamentInitialized) {
                    renderBracket();
                }
                updateInfo();
            }
        }
        
        // Add multiple sample participants
        function addMultipleParticipants() {
            const teams = [
                'Team Phoenix', 'Dragon Warriors', 'Thunder Hawks', 'Crimson Tide', 
                'Shadow Wolves', 'Elite Storm', 'Victory Legends', 'Royal Kings',
                'Golden Eagles', 'Silver Arrows', 'Blue Dolphins', 'Red Panthers',
                'Black Mambas', 'White Tigers', 'Green Griffins', 'Yellow Jackets',
                'Purple Phoenix', 'Orange Crush', 'Pink Panthers', 'Brown Bears'
            ];
            
            const count = Math.min(8, 30 - participants.length);
            for (let i = 0; i < count; i++) {
                participants.push({
                    id: Date.now() + i + Math.random(),
                    name: teams[Math.floor(Math.random() * teams.length)] + ' ' + (Math.floor(Math.random() * 10) + 1),
                    wins: 0,
                    losses: 0,
                    draws: 0,
                    totalKills: 0,
                    totalDuration: 0,
                    points: 0,
                    buchholz: 0,
                    opponents: []
                });
            }
            updateParticipantsList();
            updateInfo();
        }
        
        // Update participants list UI
        function updateParticipantsList() {
            const list = document.getElementById('participantsList');
            list.innerHTML = '';
            
            participants.forEach(p => {
                const card = document.createElement('div');
                card.className = 'participant-card';
                
                const matchesPlayed = p.wins + p.losses + p.draws;
                const winRate = matchesPlayed > 0 ? ((p.wins / matchesPlayed) * 100).toFixed(1) : 0;
                
                card.innerHTML = `
                    <div class="participant-info">
                        <span class="participant-name">${p.name}</span>
                        <span class="participant-stats">
                            W: ${p.wins} | L: ${p.losses} | D: ${p.draws} | WR: ${winRate}%
                        </span>
                    </div>
                    <div class="participant-actions">
                        <i class="fas fa-edit edit-participant" onclick="editParticipant('${p.id}')" title="Edit team"></i>
                        <i class="fas fa-times remove-participant" onclick="removeParticipant('${p.id}')" title="Remove team"></i>
                    </div>
                `;
                list.appendChild(card);
            });
        }
        
        // Update info display
        function updateInfo() {
            document.getElementById('participantCount').textContent = participants.length + '/30';
            document.getElementById('matchCount').textContent = matches.length;
            document.getElementById('currentSystem').textContent = 
                document.getElementById('bracketSystem').options[document.getElementById('bracketSystem').selectedIndex].text.split(' ')[0];
        }
        
        // Initialize tournament based on selected system
        function initializeTournament() {
            if (participants.length < 2) {
                alert('Minimum 2 participants required!');
                return;
            }
            
            bracketSystem = document.getElementById('bracketSystem').value;
            tournamentInitialized = true;
            
            // Reset matches
            matches = [];
            
            // Reset participant stats
            participants.forEach(p => {
                p.wins = 0;
                p.losses = 0;
                p.draws = 0;
                p.totalKills = 0;
                p.totalDuration = 0;
                p.points = 0;
                p.buchholz = 0;
                p.opponents = [];
            });
            
            // Generate initial bracket based on system
            switch(bracketSystem) {
                case 'single':
                    generateSingleElimination();
                    break;
                case 'double':
                    generateDoubleElimination();
                    break;
                case 'group':
                    generateGroupStage();
                    break;
                case 'swiss':
                    generateSwissSystem();

            updateParticipantsList();

        // Generate Single Elimination bracket
        function generateSingleElimination() {
            const numParticipants = participants.length;
            const numRounds = Math.ceil(Math.log2(numParticipants));
            const totalSlots = Math.pow(2, numRounds);
            
            // Create dummy participants if needed
            let shuffledParticipants = [...participants].sort(() => Math.random() - 0.5);
            let bracketParticipants = [...shuffledParticipants];
            
            // Add BYEs if needed
            while (bracketParticipants.length < totalSlots) {
                bracketParticipants.push({ id: 'bye-' + Date.now(), name: 'BYE', isBye: true });
            }
            
            // Generate first round matches
            for (let i = 0; i < totalSlots; i += 2) {
                matches.push({
                    id: 'match-' + Date.now() + i,
                    round: 1,
                    matchNumber: i/2 + 1,
                    team1: bracketParticipants[i],
                    team2: bracketParticipants[i+1],
                    team1Score: null,
                    team2Score: null,
                    team1Kills: 0,
                    team2Kills: 0,
                    team1Duration: 0,
                    team2Duration: 0,
                    winner: null,
                    nextMatchId: i/4 < Math.pow(2, numRounds - 2) ? 'round2-match-' + Math.floor(i/4) : null,
                    completed: false
                });
            }
            
            // Generate subsequent rounds
            for (let round = 2; round <= numRounds; round++) {
                const matchesInRound = Math.pow(2, numRounds - round);
                for (let i = 0; i < matchesInRound; i++) {
                    matches.push({
                        id: 'round' + round + '-match-' + i,
                        round: round,
                        matchNumber: i+1,
                        team1: null,
                        team2: null,
                        team1Score: null,
                        team2Score: null,
                        team1Kills: 0,
                        team2Kills: 0,
                        team1Duration: 0,
                        team2Duration: 0,
                        winner: null,
                        nextMatchId: round < numRounds ? 'round' + (round+1) + '-match-' + Math.floor(i/2) : null,
                        completed: false
                    });
                }
            }
        }
        
        // Generate Double Elimination bracket (simplified)
        function generateDoubleElimination() {
            // Simple implementation for demo
            generateSingleElimination();
            alert('Double Elimination: Full implementation would include Winners Bracket and Losers Bracket');
        }
        
        // Generate Group Stage
        function generateGroupStage() {
            const numGroups = Math.ceil(participants.length / 4);
            const groups = [];
            
            // Shuffle and distribute participants
            let shuffled = [...participants].sort(() => Math.random() - 0.5);
            
            for (let i = 0; i < numGroups; i++) {
                groups.push({
                    name: String.fromCharCode(65 + i),
                    teams: shuffled.slice(i * 4, (i + 1) * 4)
                });
            }
            
            // Generate group matches (round robin)
            groups.forEach((group, groupIndex) => {
                for (let i = 0; i < group.teams.length; i++) {
                    for (let j = i + 1; j < group.teams.length; j++) {
                        if (group.teams[i] && group.teams[j]) {
                            matches.push({
                                id: 'group-' + group.name + '-match-' + i + '-' + j + '-' + Date.now(),
                                round: 1,
                                group: group.name,
                                team1: group.teams[i],
                                team2: group.teams[j],
                                team1Score: null,
                                team2Score: null,
                                team1Kills: 0,
                                team2Kills: 0,
                                team1Duration: 0,
                                team2Duration: 0,
                                winner: null,
                                completed: false
                            });
                        }
                    }
                }
            });
        }
        
        // Generate Swiss System
        function generateSwissSystem() {
            // Initial random pairing
            let shuffled = [...participants].sort(() => Math.random() - 0.5);
            
            for (let i = 0; i < shuffled.length; i += 2) {
                if (i + 1 < shuffled.length) {
                    matches.push({
                        id: 'swiss-r1-match-' + (i/2) + '-' + Date.now(),
                        round: 1,
                        team1: shuffled[i],
                        team2: shuffled[i+1],
                        team1Score: null,
                        team2Score: null,
                        team1Kills: 0,
                        team2Kills: 0,
                        team1Duration: 0,
                        team2Duration: 0,
                        winner: null,
                        completed: false
                    });
                }
            }
        }

        // Save match score from modal
        function saveMatchScore() {
            if (!currentMatchId) return;
            
            const match = matches.find(m => m.id === currentMatchId);
            if (!match) return;
            
            const team1Score = document.getElementById('modalTeam1Score') ? parseInt(document.getElementById('modalTeam1Score').value) : null;
            const team1Kills = document.getElementById('modalTeam1Kills') ? parseInt(document.getElementById('modalTeam1Kills').value) || 0 : 0;
            const team1Duration = document.getElementById('modalTeam1Duration') ? parseInt(document.getElementById('modalTeam1Duration').value) || 0 : 0;
            
            const team2Score = document.getElementById('modalTeam2Score') ? parseInt(document.getElementById('modalTeam2Score').value) : null;
            const team2Kills = document.getElementById('modalTeam2Kills') ? parseInt(document.getElementById('modalTeam2Kills').value) || 0 : 0;
            const team2Duration = document.getElementById('modalTeam2Duration') ? parseInt(document.getElementById('modalTeam2Duration').value) || 0 : 0;
            
            // Update match data
            match.team1Score = team1Score;
            match.team2Score = team2Score;
            match.team1Kills = team1Kills;
            match.team2Kills = team2Kills;
            match.team1Duration = team1Duration;
            match.team2Duration = team2Duration;
            
            // Determine winner
            if (team1Score !== null && team2Score !== null) {
                if (team1Score > team2Score) {
                    match.winner = match.team1.id;
                    updateParticipantStats(match.team1.id, match.team2.id, true, team1Kills, team2Kills, team1Duration, team2Duration);
                } else if (team2Score > team1Score) {
                    match.winner = match.team2.id;
                    updateParticipantStats(match.team2.id, match.team1.id, true, team2Kills, team1Kills, team2Duration, team1Duration);
                } else {
                    // Tie - use tie-breaker (average kills)
                    if (team1Kills > team2Kills) {
                        match.winner = match.team1.id;
                        updateParticipantStats(match.team1.id, match.team2.id, true, team1Kills, team2Kills, team1Duration, team2Duration);
                    } else if (team2Kills > team1Kills) {
                        match.winner = match.team2.id;
                        updateParticipantStats(match.team2.id, match.team1.id, true, team2Kills, team1Kills, team2Duration, team1Duration);
                    } else {
                        // Still tied, use duration (shorter is better)
                        if (team1Duration < team2Duration) {
                            match.winner = match.team1.id;
                            updateParticipantStats(match.team1.id, match.team2.id, true, team1Kills, team2Kills, team1Duration, team2Duration);
                        } else {
                            match.winner = match.team2.id;
                            updateParticipantStats(match.team2.id, match.team1.id, true, team2Kills, team1Kills, team2Duration, team1Duration);
                        }
                    }
                }
                match.completed = true;
                
                // Update next match if exists
                if (match.nextMatchId) {
                    updateNextMatch(match.nextMatchId, match.winner);
                }
            }
            
            closeModal();
            renderBracket();
            updateParticipantsList();
            
            // Generate next round matches if applicable
            if (bracketSystem !== 'swiss') {
                generateNextRound();
            }

        // Update participant statistics
        function updateParticipantStats(winnerId, loserId, isWin, winnerKills, loserKills, winnerDuration, loserDuration) {
            const winner = participants.find(p => p.id === winnerId);
            const loser = participants.find(p => p.id === loserId);
            
            if (winner) {
                winner.wins++;
                winner.totalKills += winnerKills;
                winner.totalDuration += winnerDuration;
                winner.points += 3;
                winner.opponents.push(loserId);
            }
            
            if (loser) {
                loser.losses++;
                loser.totalKills += loserKills;
                loser.totalDuration += loserDuration;
                loser.opponents.push(winnerId);
            }
        }
        
        // Update score from inline inputs
        function updateScore(matchId, team, type, value) {
            const match = matches.find(m => m.id === matchId);
            if (!match) return;
            
            const numValue = parseInt(value) || 0;
            
            if (team === 'team1') {
                if (type === 'score') match.team1Score = numValue;
                else if (type === 'kills') match.team1Kills = numValue;
                else if (type === 'duration') match.team1Duration = numValue;
            } else {
                if (type === 'score') match.team2Score = numValue;
                else if (type === 'kills') match.team2Kills = numValue;
                else if (type === 'duration') match.team2Duration = numValue;
            }
            
            // Auto-determine winner if both scores are entered
            if (match.team1Score !== null && match.team2Score !== null && 
                match.team1Score !== '' && match.team2Score !== '') {
                
                if (match.team1Score > match.team2Score) {
                    match.winner = match.team1.id;
                    updateParticipantStats(match.team1.id, match.team2.id, true, match.team1Kills, match.team2Kills, match.team1Duration, match.team2Duration);
                } else if (match.team2Score > match.team1Score) {
                    match.winner = match.team2.id;
                    updateParticipantStats(match.team2.id, match.team1.id, true, match.team2Kills, match.team1Kills, match.team2Duration, match.team1Duration);
                } else {
                    // Tie - use tie-breaker
                    if (match.team1Kills > match.team2Kills) {
                        match.winner = match.team1.id;
                        updateParticipantStats(match.team1.id, match.team2.id, true, match.team1Kills, match.team2Kills, match.team1Duration, match.team2Duration);
                    } else if (match.team2Kills > match.team1Kills) {
                        match.winner = match.team2.id;
                        updateParticipantStats(match.team2.id, match.team1.id, true, match.team2Kills, match.team1Kills, match.team2Duration, match.team1Duration);
                    } else {
                        // Still tied, use duration
                        if (match.team1Duration < match.team2Duration) {
                            match.winner = match.team1.id;
                            updateParticipantStats(match.team1.id, match.team2.id, true, match.team1Kills, match.team2Kills, match.team1Duration, match.team2Duration);
                        } else {
                            match.winner = match.team2.id;
                            updateParticipantStats(match.team2.id, match.team1.id, true, match.team2Kills, match.team1Kills, match.team2Duration, match.team1Duration);
                        }
                    }
                }
                match.completed = true;
                
                if (match.nextMatchId) {
                    updateNextMatch(match.nextMatchId, match.winner);
                }
                
                renderBracket();
                updateParticipantsList();
                generateNextRound();
            }
        }
        
        // Update next match with winner
        function updateNextMatch(nextMatchId, winnerId) {
            const nextMatch = matches.find(m => m.id === nextMatchId);
            if (!nextMatch) return;
            
            const winner = participants.find(p => p.id === winnerId);
            if (!winner) return;
            
            if (!nextMatch.team1) {
                nextMatch.team1 = winner;
            } else if (!nextMatch.team2 && nextMatch.team1.id !== winner.id) {
                nextMatch.team2 = winner;
            }
        }

        // Render Swiss System
        function renderSwissSystem(wrapper) {
            wrapper.innerHTML = '';
            
            // Calculate standings with tie-breakers
            participants.forEach(p => {
                p.wins = 0;
                p.losses = 0;
                p.draws = 0;
                p.totalKills = 0;
                p.totalDuration = 0;
                p.points = 0;
                p.opponents = [];
            });
            
            matches.forEach(match => {
                if (match.completed && match.team1 && match.team2) {
                    const t1 = participants.find(p => p.id === match.team1.id);
                    const t2 = participants.find(p => p.id === match.team2.id);
                    
                    if (t1 && t2) {
                        t1.opponents.push(t2.id);
                        t2.opponents.push(t1.id);
                        
                        t1.totalKills += match.team1Kills || 0;
                        t2.totalKills += match.team2Kills || 0;
                        
                        t1.totalDuration += match.team1Duration || 0;
                        t2.totalDuration += match.team2Duration || 0;
                        
                        if (match.winner === t1.id) {
                            t1.wins++;
                            t1.points += 3;
                            t2.losses++;
                        } else if (match.winner === t2.id) {
                            t2.wins++;
                            t2.points += 3;
                            t1.losses++;
                        } else {
                            t1.draws++;
                            t2.draws++;
                            t1.points += 1;
                            t2.points += 1;
                        }
                    }
                }
            });
            
            // Calculate Buchholz (sum of opponents' scores)
            participants.forEach(p => {
                p.buchholz = 0;
                p.opponents.forEach(oppId => {
                    const opp = participants.find(op => op.id === oppId);
                    if (opp) {
                        p.buchholz += opp.points;
                    }
                });
            });
            
            // Create standings table
            const standingsDiv = document.createElement('div');
            standingsDiv.style.marginBottom = '30px';
            
            const table = document.createElement('table');
            table.className = 'swiss-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Team</th>
                        <th>Matches</th>
                        <th>Wins</th>
                        <th>Losses</th>
                        <th>Draws</th>
                        <th>Kills</th>
                        <th>Avg Kill</th>
                        <th>Duration</th>
                        <th>Points</th>
                        <th>Buchholz</th>
                    </tr>
                </thead>
                <tbody id="swiss-standings">
                </tbody>
            `;
            
            // Sort with tie-breakers: Points > Buchholz > Average Kills > Duration
            const sortedParticipants = [...participants].sort((a,b) => {
                if (b.points !== a.points) return b.points - a.points;
                if (b.buchholz !== a.buchholz) return b.buchholz - a.buchholz;
                const avgKillsA = a.totalKills / (a.wins + a.losses + a.draws) || 0;
                const avgKillsB = b.totalKills / (b.wins + b.losses + b.draws) || 0;
                if (avgKillsB !== avgKillsA) return avgKillsB - avgKillsA;
                return (a.totalDuration / (a.wins + a.losses + a.draws) || 0) - 
                       (b.totalDuration / (b.wins + b.losses + b.draws) || 0);
            });
            
            const tbody = document.getElementById('swiss-standings');
            sortedParticipants.forEach((p, index) => {
                const matchesPlayed = p.wins + p.losses + p.draws;
                const avgKills = matchesPlayed > 0 ? (p.totalKills / matchesPlayed).toFixed(2) : 0;
                const avgDuration = matchesPlayed > 0 ? (p.totalDuration / matchesPlayed).toFixed(0) : 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>#${index + 1}</strong></td>
                    <td>${p.name}</td>
                    <td>${matchesPlayed}</td>
                    <td>${p.wins}</td>
                    <td>${p.losses}</td>
                    <td>${p.draws}</td>
                    <td>${p.totalKills}</td>
                    <td>${avgKills}</td>
                    <td>${avgDuration}s</td>
                    <td><strong>${p.points}</strong></td>
                    <td>${p.buchholz}</td>
                `;
                tbody.appendChild(row);
            });
            
            standingsDiv.appendChild(table);
            wrapper.appendChild(standingsDiv);
            
            // Add current round matches
            const matchesDiv = document.createElement('div');
            matchesDiv.innerHTML = '<h3 style="color: #9b59b6; margin-bottom: 15px;">Current Round Matches</h3>';
            
            const currentRoundMatches = matches.filter(m => !m.completed);
            currentRoundMatches.forEach(match => {
                matchesDiv.appendChild(createMatchElement(match));
            });
            
            wrapper.appendChild(matchesDiv);
        }
        
        // Export to Excel
        function exportToExcel() {
            const tournamentName = document.getElementById('tournamentName').value || 'Tournament';
            const wb = XLSX.utils.book_new();
            
            // Create standings sheet
            const standingsData = [['Rank', 'Team', 'Matches', 'Wins', 'Losses', 'Draws', 'Total Kills', 'Avg Kills', 'Points', 'Buchholz']];
            
            // Calculate latest stats
            participants.forEach(p => {
                p.wins = 0;
                p.losses = 0;
                p.draws = 0;
                p.totalKills = 0;
                p.points = 0;
                p.opponents = [];
            });
            
            matches.forEach(match => {
                if (match.completed && match.team1 && match.team2) {
                    const t1 = participants.find(p => p.id === match.team1.id);
                    const t2 = participants.find(p => p.id === match.team2.id);
                    
                    if (t1 && t2) {
                        t1.totalKills += match.team1Kills || 0;
                        t2.totalKills += match.team2Kills || 0;
                        
                        if (match.winner === t1.id) {
                            t1.wins++;
                            t1.points += 3;
                            t2.losses++;
                        } else if (match.winner === t2.id) {
                            t2.wins++;
                            t2.points += 3;
                            t1.losses++;
                        }
                    }
                }
            });
            
            // Calculate Buchholz
            participants.forEach(p => {
                p.buchholz = 0;
            });
            
            participants.forEach((p, index) => {
                const matchesPlayed = p.wins + p.losses + p.draws;
                const avgKills = matchesPlayed > 0 ? (p.totalKills / matchesPlayed).toFixed(2) : 0;
                standingsData.push([
                    index + 1,
                    p.name,
                    matchesPlayed,
                    p.wins,
                    p.losses,
                    p.draws,
                    p.totalKills,
                    avgKills,
                    p.points,
                    p.buchholz
                ]);
            });
            
            const wsStandings = XLSX.utils.aoa_to_sheet(standingsData);
            XLSX.utils.book_append_sheet(wb, wsStandings, 'Standings');
            
            // Create matches sheet
            const matchesData = [['Match ID', 'Round/Group', 'Team 1', 'Score 1', 'Kills 1', 'Team 2', 'Score 2', 'Kills 2', 'Winner', 'Duration 1', 'Duration 2']];
            
            matches.forEach(m => {
                if (m.team1 && m.team2) {
                    matchesData.push([
                        m.id,
                        m.round ? 'Round ' + m.round : (m.group ? 'Group ' + m.group : 'Swiss'),
                        m.team1.name || 'BYE',
                        m.team1Score || 0,
                        m.team1Kills || 0,
                        m.team2.name || 'BYE',
                        m.team2Score || 0,
                        m.team2Kills || 0,
                        m.winner ? (participants.find(p => p.id === m.winner)?.name || 'Unknown') : 'Not Played',
                        m.team1Duration || 0,
                        m.team2Duration || 0
                    ]);
                }
            });
            
            const wsMatches = XLSX.utils.aoa_to_sheet(matchesData);
            XLSX.utils.book_append_sheet(wb, wsMatches, 'Matches');
            
            // Export
            XLSX.writeFile(wb, `${tournamentName}_Results.xlsx`);
        }
        
        // Export to PDF
        function exportToPDF() {
            const tournamentName = document.getElementById('tournamentName').value || 'Tournament';
            
            html2canvas(document.querySelector('.bracket-container')).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [canvas.width * 0.75, canvas.height * 0.75]
                });
                
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width * 0.75, canvas.height * 0.75);
                pdf.save(`${tournamentName}_Bracket.pdf`);
            });
        }
        
        // Print bracket
        function printBracket() {
            window.print();
        }
        
        // Initialize with sample data
        window.onload = function() {
            addMultipleParticipants();
        };
    </script>
</body>
