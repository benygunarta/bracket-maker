<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Tournament Bracket Maker</title>
    <style>
        /* Professional Design System */
        :root {
            --primary-50: #f0f9ff;
            --primary-100: #e0f2fe;
            --primary-200: #bae6fd;
            --primary-300: #7dd3fc;
            --primary-400: #38bdf8;
            --primary-500: #0ea5e9;
            --primary-600: #0284c7;
            --primary-700: #0369a1;
            --primary-800: #075985;
            --primary-900: #0c4a6e;
            
            --accent-50: #ecfdf5;
            --accent-500: #10b981;
            --accent-600: #059669;
            
            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-500: #6b7280;
            --neutral-600: #4b5563;
            --neutral-700: #374151;
            --neutral-800: #1f2937;
            --neutral-900: #111827;
            
            --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-card-hover: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--neutral-800);
        }

        /* Professional Container */
        .tournament-container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* Header */
        .tournament-header {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
            color: white;
            padding: 30px 40px;
        }

        .tournament-header h1 {
            font-size: 2.2em;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .tournament-header p {
            color: var(--primary-100);
            font-size: 1.1em;
        }

        /* Progress Bar - Professional Style */
        .progress-container {
            padding: 30px 40px 0;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 40px;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--neutral-200);
            transform: translateY(-50%);
            z-index: 1;
        }

        .step {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--neutral-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2em;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .step.active {
            border-color: var(--primary-500);
            background: var(--primary-500);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 0 4px var(--primary-100);
        }

        .step.completed {
            border-color: var(--accent-500);
            background: var(--accent-500);
            color: white;
        }

        .step-label {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--neutral-500);
            white-space: nowrap;
            font-weight: 500;
        }

        .step.active .step-label,
        .step.completed .step-label {
            color: var(--primary-600);
            font-weight: 600;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            min-height: 600px;
        }

        /* Team Manager Panel */
        .team-manager {
            width: 320px;
            background: var(--neutral-50);
            border-right: 1px solid var(--neutral-200);
            padding: 24px;
            overflow-y: auto;
        }

        .team-manager h3 {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--neutral-700);
            margin-bottom: 16px;
            letter-spacing: -0.01em;
        }

        .team-count {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-count span {
            font-weight: 600;
            color: var(--primary-600);
        }

        .add-team-form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .add-team-form input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--neutral-200);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .add-team-form input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        .teams-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .team-item {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .team-item:hover {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-card);
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-seed {
            width: 28px;
            height: 28px;
            background: var(--primary-100);
            color: var(--primary-700);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .team-name {
            font-weight: 500;
            font-size: 14px;
        }

        .team-actions {
            display: flex;
            gap: 4px;
        }

        .team-actions button {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit {
            background: var(--neutral-100);
            color: var(--neutral-600);
        }

        .btn-edit:hover {
            background: var(--neutral-200);
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-delete:hover {
            background: #fecaca;
        }

        /* Bracket Viewer */
        .bracket-viewer {
            flex: 1;
            padding: 24px;
            overflow-x: auto;
            position: relative;
            background: white;
        }

        .bracket-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .bracket-title {
            font-size: 1.3em;
            font-weight: 600;
            color: var(--neutral-800);
        }

        .control-buttons {
            display: flex;
            gap: 12px;
        }

        /* Buttons - Professional Style */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary-600);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-700);
            transform: translateY(-1px);
            box-shadow: var(--shadow-card-hover);
        }

        .btn-secondary {
            background: white;
            border: 1px solid var(--neutral-200);
            color: var(--neutral-700);
        }

        .btn-secondary:hover {
            background: var(--neutral-50);
            border-color: var(--neutral-300);
        }

        .btn-accent {
            background: var(--accent-500);
            color: white;
        }

        .btn-accent:hover {
            background: var(--accent-600);
        }

        /* Bracket Layout */
        .bracket-container {
            position: relative;
            min-height: 500px;
        }

        .bracket {
            display: inline-flex;
            gap: 48px;
            padding: 20px 0 40px;
        }

        /* Round Column */
        .round-column {
            display: flex;
            flex-direction: column;
            min-width: 280px;
        }

        .round-header {
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--neutral-200);
        }

        .round-name {
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary-600);
        }

        .round-name.final {
            color: var(--accent-600);
        }

        .round-subtitle {
            font-size: 0.8em;
            color: var(--neutral-500);
            margin-top: 4px;
        }

        .matches {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Match Card - Professional Design */
        .match-card {
            background: white;
            border: 2px solid var(--neutral-200);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }

        .match-card:hover {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-2px);
        }

        .match-card.completed {
            border-color: var(--accent-500);
            background: linear-gradient(to bottom, white, var(--accent-50));
        }

        .match-card.final {
            border-color: var(--primary-500);
            border-width: 2px;
            background: linear-gradient(to bottom, white, var(--primary-50));
        }

        .match-number {
            position: absolute;
            top: -10px;
            left: 16px;
            background: white;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--neutral-500);
            border-radius: 12px;
            border: 1px solid var(--neutral-200);
        }

        .team-slot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin: 4px 0;
            background: var(--neutral-50);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .team-slot.winner {
            background: var(--accent-50);
            border: 1px solid var(--accent-200);
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .team-seed-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--neutral-500);
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--neutral-200);
        }

        .team-name {
            font-weight: 500;
            font-size: 14px;
        }

        .team-name.bye {
            color: var(--neutral-400);
            font-style: italic;
        }

        .score-input {
            width: 60px;
            padding: 6px;
            border: 1px solid var(--neutral-200);
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 2px var(--primary-100);
        }

        .score-display {
            font-weight: 600;
            font-size: 16px;
            color: var(--neutral-700);
        }

        .match-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .match-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit {
            background: var(--primary-600);
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--primary-700);
        }

        .btn-submit:disabled {
            background: var(--neutral-300);
            cursor: not-allowed;
        }

        .winner-badge {
            margin-top: 8px;
            padding: 8px;
            background: var(--accent-50);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-700);
            font-size: 13px;
            font-weight: 500;
        }

        /* SVG Connector Lines */
        .connector-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .connector-path {
            stroke: var(--neutral-300);
            stroke-width: 2;
            fill: none;
        }

        .connector-path.winner {
            stroke: var(--accent-500);
            stroke-width: 3;
        }

        .connector-path.loser {
            stroke-dasharray: 5,5;
        }

        /* Group Stage Layout */
        .group-stage {
            padding: 20px;
        }

        .group-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--neutral-200);
            padding-bottom: 12px;
        }

        .group-tab {
            padding: 8px 20px;
            border: none;
            background: none;
            font-weight: 500;
            color: var(--neutral-600);
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .group-tab:hover {
            background: var(--neutral-100);
            color: var(--primary-600);
        }

        .group-tab.active {
            background: var(--primary-600);
            color: white;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .standings-table th {
            background: var(--neutral-50);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            color: var(--neutral-600);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .standings-table td {
            padding: 12px;
            border-bottom: 1px solid var(--neutral-200);
            font-size: 14px;
        }

        .standings-table tr:last-child td {
            border-bottom: none;
        }

        .standings-table tr:hover td {
            background: var(--neutral-50);
        }

        /* Double Elimination Layout */
        .double-elimination {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .bracket-section {
            position: relative;
        }

        .bracket-section::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: var(--neutral-300);
            transform: translateX(-50%);
        }

        .bracket-section:last-child::after {
            display: none;
        }

        .section-title {
            font-size: 1em;
            font-weight: 600;
            color: var(--primary-700);
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 4px solid var(--primary-500);
        }

        /* Champion Banner */
        .champion-banner {
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 24px;
            color: #78350f;
        }

        .champion-trophy {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .champion-name {
            font-size: 3.5em;
            font-weight: 700;
            margin: 20px 0;
            letter-spacing: -0.02em;
        }

        /* Footer */
        .tournament-footer {
            padding: 20px 40px;
            border-top: 1px solid var(--neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--neutral-50);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .modal-content h3 {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: var(--neutral-800);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--neutral-200);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-layout {
                flex-direction: column;
            }
            
            .team-manager {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--neutral-200);
            }
        }

        @media (max-width: 768px) {
            .tournament-header {
                padding: 20px;
            }
            
            .progress-container {
                padding: 20px 20px 0;
            }
            
            .step-label {
                font-size: 10px;
            }
            
            .bracket {
                gap: 24px;
            }
            
            .round-column {
                min-width: 240px;
            }
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-4 {
            margin-top: 16px;
        }

        .mb-4 {
            margin-bottom: 16px;
        }

        .gap-2 {
            gap: 8px;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="tournament-container">
        <!-- Header -->
        <div class="tournament-header">
            <h1>🏆 Professional Tournament Bracket</h1>
            <p>Industry-standard visualization with professional bracket design</p>
        </div>

        <!-- Progress Steps -->
        <div class="progress-container">
            <div class="progress-steps">
                <div class="step" data-step="1">
                    1
                    <span class="step-label">Create</span>
                </div>
                <div class="step" data-step="2">
                    2
                    <span class="step-label">Teams</span>
                </div>
                <div class="step" data-step="3">
                    3
                    <span class="step-label">Seed</span>
                </div>
                <div class="step" data-step="4">
                    4
                    <span class="step-label">Bracket</span>
                </div>
                <div class="step" data-step="5">
                    5
                    <span class="step-label">Play</span>
                </div>
                <div class="step" data-step="6">
                    6
                    <span class="step-label">Champion</span>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Team Manager Panel -->
            <div class="team-manager" id="teamManager">
                <h3>Team Management</h3>
                
                <div class="team-count">
                    <span>Total Teams</span>
                    <span id="teamCount">0/64</span>
                </div>

                <div class="add-team-form">
                    <input type="text" id="teamNameInput" placeholder="Enter team name">
                    <button class="btn btn-primary" onclick="addTeam()">Add</button>
                </div>

                <div class="teams-list" id="teamsList">
                    <!-- Teams will be rendered here -->
                </div>

                <div class="mt-4">
                    <button class="btn btn-secondary" onclick="randomizeTeams()" style="width: 100%;">
                        🎲 Randomize Order
                    </button>
                </div>
            </div>

            <!-- Bracket Viewer -->
            <div class="bracket-viewer">
                <div class="bracket-controls">
                    <div class="bracket-title" id="bracketTitle">Tournament Setup</div>
                    <div class="control-buttons" id="controlButtons">
                        <!-- Buttons will be dynamic -->
                    </div>
                </div>

                <!-- Content Area -->
                <div id="contentArea" class="bracket-container">
                    <!-- Dynamic content will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="tournament-footer">
            <div>
                <span class="text-neutral-600">© 2024 Professional Tournament Bracket</span>
            </div>
            <div class="flex gap-2">
                <button class="btn btn-secondary" onclick="exportBracket()">📸 Export PNG</button>
                <button class="btn btn-secondary" onclick="resetTournament()">🔄 Reset</button>
            </div>
        </div>
    </div>

    <!-- Edit Team Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>Edit Team</h3>
            <input type="text" id="editTeamName" placeholder="Team name">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTeamEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== STATE MANAGEMENT ====================
        let appState = {
            currentStep: 1,
            tournament: {
                id: null,
                name: 'My Tournament',
                format: 'single-elimination'
            },
            teams: [],
            matches: [],
            rounds: [],
            history: [],
            historyIndex: -1,
            editingTeamId: null,
            selectedGroup: 0,
            connectors: []
        };

        // Load from localStorage
        function loadState() {
            const saved = localStorage.getItem('proTournamentState');
            if (saved) {
                try {
                    appState = JSON.parse(saved);
                } catch (e) {
                    console.error('Failed to load state');
                }
            }
            updateUI();
        }

        // Save to localStorage
        function saveState() {
            localStorage.setItem('proTournamentState', JSON.stringify(appState));
        }

        // ==================== UI UPDATE ====================
        function updateUI() {
            updateProgressSteps();
            updateTeamManager();
            updateBracketView();
            updateControlButtons();
        }

        function updateProgressSteps() {
            const steps = document.querySelectorAll('.step');
            steps.forEach((step, index) => {
                const stepNum = index + 1;
                step.classList.remove('active', 'completed');
                
                if (stepNum === appState.currentStep) {
                    step.classList.add('active');
                } else if (stepNum < appState.currentStep) {
                    step.classList.add('completed');
                }
            });
        }

        function updateTeamManager() {
            const teamManager = document.getElementById('teamManager');
            const teamCount = document.getElementById('teamCount');
            const teamsList = document.getElementById('teamsList');

        function renderMatchCard(match, options = {}) {

            const isBye = !match.teamA || !match.teamB;
            
            if (compact) {
                return `
                    <div class="match-card" style="margin-top: ${offset}px;">
                        <div class="team-slot ${match.winner?.id === match.teamA?.id ? 'winner' : ''}">

                        <div class="team-slot ${match.winner?.id === match.teamB?.id ? 'winner' : ''}">
                            <span class="team-name">${match.teamB?.name || 'TBD'}</span>
                            <span class="score-display">${match.scoreB || '-'}</span>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="match-card ${isCompleted ? 'completed' : ''} ${isLastRound || isFinal ? 'final' : ''}" 
                     style="margin-top: ${offset}px;" 
                     data-match-id="${match.id}">
                    <span class="match-number">Match ${match.matchNumber || '●'}</span>
                    
                    <div class="team-slot ${match.winner?.id === match.teamA?.id ? 'winner' : ''}">

                                   onchange="updateScore('${match.id}', 'A', this.value)">
                        ` : ''}
                        ${isCompleted && match.teamA ? `
                            <span class="score-display">${match.scoreA}</span>
                        ` : ''}
                    </div>
                    
                    <div class="team-slot ${match.winner?.id === match.teamB?.id ? 'winner' : ''}">
                        <div class="team-info">
                            ${match.teamB ? `<span class="team-seed-badge">#${match.teamB.seed || '?'}</span>` : ''}
                            <span class="team-name ${!match.teamB ? 'bye' : ''}">
                                ${match.teamB?.name || 'TBD'} ${!match.teamB ? '(BYE)' : ''}

                        ` : ''}

                        ` : ''}

                    ${!isCompleted && !isBye ? `
                        <div class="match-actions">
                            <button class="btn-submit" onclick="submitMatchResult('${match.id}')">Submit Result</button>
                        </div>
                    ` : ''}
                    
                    ${isCompleted && match.winner ? `
                        <div class="winner-badge">
                            <span>🏆</span>
                            <span>Winner: ${match.winner.name}</span>
                        </div>
                    ` : ''}

        // ==================== BRACKET GENERATION ====================
        function generateBracket() {
            switch(appState.tournament.format) {
                case 'single-elimination':
                    generateSingleElimination();
                    break;
                case 'double-elimination':
                    generateDoubleElimination();
                    break;
                case 'round-robin':
                    generateRoundRobin();
                    break;
                case 'group-playoff':
                    generateGroupStage();
                    break;
            }
            
            appState.currentStep = 4;
            saveState();
            updateUI();
            
            // Draw connectors after bracket is rendered
            setTimeout(drawConnectors, 100);
        }

        function generateSingleElimination() {
            const bracketSize = nextPowerOfTwo(appState.teams.length);
            const numRounds = Math.log2(bracketSize);
            const matches = [];
            const rounds = [];
            
            // Seed teams
            const seededTeams = seedTeams(appState.teams);
            
            // Round names
            const roundNames = [
                'Round of ' + bracketSize,
                'Quarter Finals',
                'Semi Finals',
                'Finals'
            ];
            
            // Generate matches
            let matchCount = bracketSize / 2;
            let teamIndex = 0;
            
            for (let round = 1; round <= numRounds; round++) {
                const roundMatches = [];
                
                for (let i = 0; i < matchCount; i++) {
                    const match = {
                        id: generateId(),
                        round: round,
                        roundName: roundNames[round - 1] || `Round ${round}`,
                        matchNumber: i + 1,
                        teamA: round === 1 ? seededTeams[teamIndex] || null : null,
                        teamB: round === 1 ? seededTeams[teamIndex + 1] || null : null,
                        scoreA: null,
                        scoreB: null,
                        winner: null,
                        nextMatchId: null,
                        bracket: 'winner'
                    };
                    
                    roundMatches.push(match);
                    teamIndex += 2;
                }
                
                matches.push(...roundMatches);
                rounds.push({
                    id: generateId(),
                    name: roundNames[round - 1] || `Round ${round}`,
                    matches: roundMatches.map(m => m.id)
                });
                
                matchCount = Math.floor(matchCount / 2);
                teamIndex = 0;
            }
            
            // Link matches
            for (let i = 0; i < matches.length; i++) {
                const match = matches[i];
                if (match.round < numRounds) {
                    const nextRoundMatches = matches.filter(m => m.round === match.round + 1);
                    const targetIndex = Math.floor((match.matchNumber - 1) / 2);
                    if (nextRoundMatches[targetIndex]) {
                        match.nextMatchId = nextRoundMatches[targetIndex].id;
                    }
                }
            }
            
            // Handle BYEs
            matches.forEach(match => {
                if (!match.teamA && match.teamB) {
                    match.winner = match.teamB;
                    match.scoreA = 0;
                    match.scoreB = 1;
                    propagateWinner(matches, match.id, match.teamB);
                } else if (match.teamA && !match.teamB) {
                    match.winner = match.teamA;
                    match.scoreA = 1;
                    match.scoreB = 0;
                    propagateWinner(matches, match.id, match.teamA);
                }
            });
            
            appState.matches = matches;
            appState.rounds = rounds;
        }

        function generateDoubleElimination() {
            const bracketSize = nextPowerOfTwo(appState.teams.length);
            const seededTeams = seedTeams(appState.teams);
            const matches = [];
            
            // Winner's bracket
            for (let i = 0; i < bracketSize / 2; i++) {
                matches.push({
                    id: generateId(),
                    round: 1,
                    bracket: 'winner',
                    roundName: 'Winner Round 1',
                    matchNumber: i + 1,
                    teamA: seededTeams[i * 2] || null,
                    teamB: seededTeams[i * 2 + 1] || null,
                    scoreA: null,
                    scoreB: null,
                    winner: null,
                    loser: null,
                    nextWinnerMatchId: null,
                    nextLoserMatchId: null
                });
            }
            
            // Loser's bracket
            for (let i = 0; i < bracketSize / 4; i++) {
                matches.push({
                    id: generateId(),
                    round: 1,
                    bracket: 'loser',
                    roundName: 'Loser Round 1',
                    matchNumber: i + 1,
                    teamA: null,
                    teamB: null,
                    scoreA: null,
                    scoreB: null,
                    winner: null,
                    nextMatchId: null
                });
            }
            
            // Grand Final
            matches.push({
                id: generateId(),
                round: 99,
                bracket: 'final',
                roundName: 'Grand Final',
                teamA: null,
                teamB: null,
                scoreA: null,
                scoreB: null,
                winner: null,
                isReset: false
            });
            
            appState.matches = matches;
            appState.rounds = [];
        }

        function generateRoundRobin() {
            const matches = [];
            
            for (let i = 0; i < appState.teams.length; i++) {
                for (let j = i + 1; j < appState.teams.length; j++) {
                    matches.push({
                        id: generateId(),
                        round: 1,
                        teamA: appState.teams[i],
                        teamB: appState.teams[j],
                        scoreA: null,
                        scoreB: null,
                        winner: null,
                        group: 'round-robin'
                    });
                }
            }
            
            appState.matches = matches;
            appState.rounds = [];
        }

        function generateGroupStage() {
            const numGroups = 4;
            const teamsPerGroup = Math.ceil(appState.teams.length / numGroups);
            const matches = [];
            
            // Split into groups
            for (let g = 0; g < numGroups; g++) {
                const start = g * teamsPerGroup;
                const end = start + teamsPerGroup;
                const groupTeams = appState.teams.slice(start, end);
                
                // Group matches
                for (let i = 0; i < groupTeams.length; i++) {
                    for (let j = i + 1; j < groupTeams.length; j++) {
                        matches.push({
                            id: generateId(),
                            round: 1,
                            group: g,
                            teamA: groupTeams[i],
                            teamB: groupTeams[j],
                            scoreA: null,
                            scoreB: null,
                            winner: null
                        });
                    }
                }
            }
            
            // Generate playoff bracket (simplified)
            for (let i = 0; i < 4; i++) {
                matches.push({
                    id: generateId(),
                    round: 2,
                    group: 'playoff',
                    roundName: 'Quarter Finals',
                    teamA: null,
                    teamB: null,
                    scoreA: null,
                    scoreB: null,
                    winner: null,
                    nextMatchId: null
                });
            }
            
            appState.matches = matches;
            appState.rounds = [];
        }

        // ==================== MATCH MANAGEMENT ====================
        let tempScores = {};

        function updateScore(matchId, team, value) {
            if (!tempScores[matchId]) {
                tempScores[matchId] = {};
            }
            tempScores[matchId][team] = parseInt(value) || 0;
        }

        function submitMatchResult(matchId) {
            const match = appState.matches.find(m => m.id === matchId);
            if (!match) return;
            
            const scores = tempScores[matchId] || {};
            const scoreA = scores.A !== undefined ? scores.A : match.scoreA || 0;
            const scoreB = scores.B !== undefined ? scores.B : match.scoreB || 0;
            
            if (scoreA === scoreB) {
                alert('Scores cannot be tied');
                return;
            }
            
            // Save to history
            appState.history = appState.history.slice(0, appState.historyIndex + 1);
            appState.history.push(JSON.parse(JSON.stringify(appState.matches)));
            appState.historyIndex++;
            
            // Update match
            match.scoreA = scoreA;
            match.scoreB = scoreB;
            match.winner = scoreA > scoreB ? match.teamA : match.teamB;
            
            // Propagate
            if (match.nextMatchId) {
                propagateWinner(appState.matches, match.id, match.winner);
            }
            
            // Check for champion
            checkChampion();
            
            delete tempScores[matchId];
            saveState();
            updateUI();
            
            // Redraw connectors
            setTimeout(drawConnectors, 100);
        }

        function propagateWinner(matches, matchId, winner) {
            const match = matches.find(m => m.id === matchId);
            if (!match || !match.nextMatchId) return;
            
            const nextMatch = matches.find(m => m.id === match.nextMatchId);
            if (!nextMatch) return;
            
            const prevMatches = matches.filter(m => m.nextMatchId === match.nextMatchId);
            const slotIndex = prevMatches.findIndex(m => m.id === matchId);
            
            if (slotIndex === 0) {
                nextMatch.teamA = winner;
            } else if (slotIndex === 1) {
                nextMatch.teamB = winner;
            }
            
            // Handle BYE
            if (nextMatch.teamA && !nextMatch.teamB) {
                nextMatch.winner = nextMatch.teamA;
                nextMatch.scoreA = 1;
                nextMatch.scoreB = 0;
                if (nextMatch.nextMatchId) {
                    propagateWinner(matches, nextMatch.id, nextMatch.winner);
                }
            } else if (!nextMatch.teamA && nextMatch.teamB) {
                nextMatch.winner = nextMatch.teamB;
                nextMatch.scoreA = 0;
                nextMatch.scoreB = 1;
                if (nextMatch.nextMatchId) {
                    propagateWinner(matches, nextMatch.id, nextMatch.winner);
                }
            }
        }

        function undoLast() {
            if (appState.historyIndex >= 0) {
                appState.matches = JSON.parse(JSON.stringify(appState.history[appState.historyIndex]));
                appState.historyIndex--;
                saveState();
                updateUI();
                setTimeout(drawConnectors, 100);
            }
        }

        function checkChampion() {
            if (appState.tournament.format === 'single-elimination') {
                const finalMatch = appState.matches.find(m => m.roundName === 'Finals' && m.winner);
                if (finalMatch) {
                    appState.currentStep = 6;
                    appState.champion = finalMatch.winner;
                    saveState();
                }
            }
        }

        function findChampion() {
            if (appState.tournament.format === 'single-elimination') {
                const finalMatch = appState.matches.find(m => m.roundName === 'Finals');
                return finalMatch ? finalMatch.winner : null;
            }
            return null;
        }

        // ==================== CONNECTOR LINES ====================
        function drawConnectors() {
            const svg = document.getElementById('connectorSvg');
            if (!svg) return;
            
            svg.innerHTML = '';
            
            const matches = document.querySelectorAll('.match-card');
            const matchMap = new Map();
            
            matches.forEach(match => {
                const id = match.dataset.matchId;
                const rect = match.getBoundingClientRect();
                const container = document.querySelector('.bracket-container').getBoundingClientRect();
                
                matchMap.set(id, {
                    left: rect.left - container.left + rect.width,
                    right: rect.right - container.left,
                    top: rect.top - container.top,
                    bottom: rect.bottom - container.top,
                    centerY: rect.top - container.top + rect.height / 2
                });
            });
            
            appState.matches.forEach(match => {
                if (match.nextMatchId && matchMap.has(match.id) && matchMap.has(match.nextMatchId)) {
                    const from = matchMap.get(match.id);
                    const to = matchMap.get(match.nextMatchId);
                    
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const startX = from.right;
                    const startY = from.centerY;
                    const endX = to.left;
                    const endY = to.centerY;
                    
                    const midX = (startX + endX) / 2;
                    const d = `M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`;
                    
                    path.setAttribute('d', d);
                    path.setAttribute('class', `connector-path ${match.winner ? 'winner' : ''}`);
                    
                    svg.appendChild(path);
                }
            });
        }

        // ==================== TEAM MANAGEMENT ====================
        function addTeam() {
            const input = document.getElementById('teamNameInput');
            const name = input.value.trim();
            
            if (!name) {
                alert('Team name cannot be empty');
                return;
            }
            
            if (appState.teams.some(t => t.name.toLowerCase() === name.toLowerCase())) {
                alert('Team name must be unique');
                return;
            }
            
            if (appState.teams.length >= 64) {
                alert('Maximum 64 teams allowed');
                return;
            }
            
            appState.teams.push({
                id: generateId(),
                name: name,
                seed: appState.teams.length + 1
            });
            
            input.value = '';
            saveState();
            updateUI();
        }

        function deleteTeam(teamId) {
            if (confirm('Are you sure you want to delete this team?')) {
                appState.teams = appState.teams.filter(t => t.id !== teamId);
                saveState();
                updateUI();
            }
        }

        function openEditModal(teamId, currentName) {
            appState.editingTeamId = teamId;
            document.getElementById('editTeamName').value = currentName;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            appState.editingTeamId = null;
        }

        function saveTeamEdit() {
            const newName = document.getElementById('editTeamName').value.trim();
            
            if (!newName) {
                alert('Team name cannot be empty');
                return;
            }
            
            const team = appState.teams.find(t => t.id === appState.editingTeamId);
            if (team) {
                team.name = newName;
            }
            
            closeEditModal();
            saveState();
            updateUI();
        }

        function randomizeTeams() {
            for (let i = appState.teams.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [appState.teams[i], appState.teams[j]] = [appState.teams[j], appState.teams[i]];
            }
            
            appState.teams.forEach((team, index) => {
                team.seed = index + 1;
            });
            
            saveState();
            updateUI();
        }

        // ==================== TOURNAMENT ACTIONS ====================
        function createTournament() {
            const name = document.getElementById('tournamentName').value;
            const format = document.getElementById('tournamentFormat').value;
            
            if (!name.trim()) {
                alert('Please enter a tournament name');
                return;
            }
            
            appState.tournament = {
                id: generateId(),
                name: name,
                format: format
            };
            
            appState.currentStep = 2;
            saveState();
            updateUI();
        }

        function nextStep() {
            if (appState.currentStep === 2) {
                appState.currentStep = 3;
            } else if (appState.currentStep === 3) {
                appState.currentStep = 4;
            }
            updateUI();
        }

        function goToStep(step) {
            if (step >= 1 && step <= 6) {
                appState.currentStep = step;
                updateUI();
            }
        }

        function selectGroup(index) {
            appState.selectedGroup = index;
            updateUI();
        }

        function resetTournament() {
            if (confirm('Reset tournament? All progress will be lost.')) {
                appState = {
                    currentStep: 1,
                    tournament: {
                        id: null,
                        name: 'My Tournament',
                        format: 'single-elimination'
                    },
                    teams: [],
                    matches: [],
                    rounds: [],
                    history: [],
                    historyIndex: -1,
                    editingTeamId: null,
                    selectedGroup: 0,
                    connectors: []
                };
                saveState();
                updateUI();
            }
        }

        function exportBracket() {
            alert('PNG export would be implemented with html2canvas in production');
        }

        // ==================== UTILITY FUNCTIONS ====================
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function nextPowerOfTwo(n) {
            return Math.pow(2, Math.ceil(Math.log2(n)));
        }

        function seedTeams(teams) {
            const sorted = [...teams].sort((a, b) => (a.seed || 999) - (b.seed || 999));
            const seeded = [];
            
            let left = 0;
            let right = sorted.length - 1;
            
            while (left <= right) {
                if (left === right) {
                    seeded.push(sorted[left]);
                    break;
                }
                seeded.push(sorted[left]);
                seeded.push(sorted[right]);
                left++;
                right--;
            }
            
            return seeded;
        }

        function organizeRounds(matches) {
            const rounds = [];
            const roundMap = new Map();
            
            matches.forEach(match => {
                const roundName = match.roundName || `Round ${match.round}`;
                if (!roundMap.has(roundName)) {
                    roundMap.set(roundName, []);
                }
                roundMap.get(roundName).push(match);
            });
            
            roundMap.forEach((matches, name) => {
                rounds.push({ name, matches });
            });
            
            return rounds;
        }

        function calculateStandings(teams, matches) {
            const standings = teams.map(team => ({
                id: team.id,
                name: team.name,
                played: 0,
                won: 0,
                lost: 0,
                points: 0
            }));
            
            matches.forEach(match => {
                if (match.winner) {
                    const winner = standings.find(s => s.id === match.winner.id);
                    const loser = standings.find(s => 
                        s.id === (match.teamA?.id === match.winner.id ? match.teamB?.id : match.teamA?.id)
                    );
                    
                    if (winner) {
                        winner.played++;
                        winner.won++;
                        winner.points += 3;
                    }
                    if (loser) {
                        loser.played++;
                        loser.lost++;
                    }
                }
            });
            
            return standings.sort((a, b) => b.points - a.points);
        }

        // ==================== INITIALIZATION ====================
        window.addEventListener('resize', () => {
            setTimeout(drawConnectors, 100);
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', loadState);
    </script>
